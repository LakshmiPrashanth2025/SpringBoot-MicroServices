server:
  port: 8085
#server.port=8085

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ 
#eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

#--------------------------------------------

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: microservice1
              uri: lb://microservice1
              predicates:
                - Path=/products/**
            - id: microservice2
              uri: lb://microservice2
              predicates:
                - Path=/orders/**

# spring.cloud.gateway.server.webflux.routes[0].id=1
# spring.cloud.gateway.server.webflux.routes[0].uri=lb://microservice1
# spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/orders/**


logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.netty: DEBUG

management:
  endpoint:
    gateway:
      access: unrestricted 
  endpoints:
    web:
      exposure:
        include: "*"